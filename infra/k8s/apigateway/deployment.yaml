apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment 
  namespace: ld
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ld
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: ld
    spec:
      containers:
        - name: api-cont
          image: chandu554/api-gateway-lb-service:latest
          ports:
            - containerPort: 3003
          envFrom:
            - configMapRef:
                - name: api-config 
            - secretKeyRef: 
                - name: api-secret
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "200m"
              memory: "512Mi"